[set.menuextra.clock]
FlashDateSeparators = false
Show24Hour = false
ShowAMPM = true
ShowDate = 2
ShowDayOfWeek = false
ShowSeconds = false

[set.finder]
AppleShowAllFiles = true
CreateDesktop = false
ShowPathbar = true
ShowExternalHardDrivesOnDesktop = false
FXRemoveOldTrashItems = true
FXEnableExtensionChangeWarning = false
FXDefaultSearchScope = "SCcf"

[set.AppleMultitouchTrackpad]
FirstClickThreshold = 0
TrackpadThreeFingerDrag = true

[set.dock]
tilesize = 50
autohide = true
static-only = true
show-recents = false
magnification = false
orientation = "bottom"
mineffect = "suck"
autohide-delay = 0
autohide-time-modifier = 0
expose-group-apps = false

[set.screencapture]
show-thumbnail = false
target = "clipboard"
type = "png"

[set.NSGlobalDomain]
KeyRepeat = 2
InitialKeyRepeat = 15
NSDocumentSaveNewDocumentsToCloud = false
NSAutomaticInlinePredictionEnabled = false
NSAutomaticSpellingCorrectionEnabled = false
"com.apple.keyboard.fnState" = false

[command.hostname]
run = """
scutil --set ComputerName "Ray’s MacBook Pro"
scutil --set HostName "ray-macbook-pro"
scutil --set LocalHostName "ray-macbook-pro"
"""
ensure_first = true
sudo = true

[brew]
formulae = ["gnupg", "felixkratz/formulae/sketchybar", "machlit/tap/cutler", "tursodatabase/tap/turso", "tailscale", "jackielii/tap/skhd-zig", "fastfetch", "helix", "chezmoi", "oven-sh/bun/bun", "glow", "asmvik/formulae/yabai", "tree", "pinentry-mac", "zoxide", "gh", "dmmulroy/tap/jj-starship", "agent-browser", "fzf", "felixkratz/formulae/borders", "fnm"]
casks = ["raycast", "lunar", "thebrowsercompany-dia", "antinote", "notion", "zed@preview", "discord@canary", "music-decoy", "little-snitch", "steam", "ghostty@tip", "slack@beta", "karabiner-elements", "font-sketchybar-app-font", "tailscale-app", "alcove", "spotify", "screen-studio", "font-sf-pro", "superkey", "orbstack", "prismlauncher"]
taps = ["dmmulroy/tap", "asmvik/formulae", "mediosz/tap", "libsql/sqld", "nikitabobko/tap", "oven-sh/bun", "jackielii/tap", "felixkratz/formulae", "tursodatabase/tap", "machlit/tap"]
no_deps = true
